[env:seeed_xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
lib_deps = 
	tinyu-zhao/TinyGPSPlus-ESP32@^0.0.2
	plerup/EspSoftwareSerial@^8.2.0
; upload_port = /dev/ttyACM0
; monitor_port = /dev/ttyACM0
; monitor_speed = 115200
